<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Roblox Arşiv</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
}

/* Navbar */

nav{
display:flex;
justify-content:space-between;
padding:20px 60px;
border-bottom:1px solid red;
}

.logo{
color:red;
font-size:28px;
}

/* Hero */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:90px;
color:red;
}

/* Chat */

#chatBox{
position:fixed;
bottom:20px;
right:20px;
width:280px;
background:#050505;
border:1px solid red;
padding:15px;
border-radius:15px;
}

#aiResponse{
height:150px;
overflow:auto;
font-size:14px;
}

#aiInput{
width:100%;
margin-top:10px;
}

</style>
</head>

<body>

<nav>
<div class="logo">Roblox Arşiv</div>
</nav>

<section class="hero">
<h1>Roblox Arşiv</h1>
<p>Basit AI Chat Sistemi</p>
</section>

<!-- Chat -->

<div id="chatBox">

<div id="aiResponse"></div>

<input id="aiInput"
placeholder="Bir şey yaz..."
>

</div>

<script>

/* Basit AI */

const input=document.getElementById("aiInput");
const response=document.getElementById("aiResponse");

input.addEventListener("keypress",e=>{

if(e.key==="Enter"){

let text=input.value.toLowerCase();
let answer="Bunu anlamadım.";

if(text.includes("roblox")){
answer="Roblox arşiv sitesine hoş geldin.";
}

if(text.includes("site")){
answer="Bu site arşiv platformudur.";
}

response.innerHTML+="<br>Sen: "+input.value;
response.innerHTML+="<br>AI: "+answer;

input.value="";
}

});

</script>

</body>
</html>
