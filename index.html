<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Roblox Arşiv GOD MODE</title>

<style>

body{
    margin:0;
    background:black;
    color:white;
    font-family:system-ui;
    overflow-x:hidden;
}

/* Loader */

#loader{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:60px;
    z-index:9999;
    animation:fadeOut 2s forwards;
    animation-delay:2s;
}

@keyframes fadeOut{
    to{opacity:0; visibility:hidden;}
}

/* Hero */

.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1{
    font-size:140px;
    text-shadow:
    0 0 30px red,
    0 0 60px darkred;
}

/* Cards */

.grid{
    padding:200px 10%;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
    gap:50px;
}

.card{
    background:rgba(0,0,0,.6);
    border:1px solid red;
    padding:50px;
    border-radius:40px;
    backdrop-filter:blur(20px);
    transition:.6s;
}

.card:hover{
    transform:translateY(-25px) scale(1.08);
    box-shadow:0 0 80px red;
}

/* Particle */

.particle{
    position:fixed;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
}

/* Mouse light */

#light{
    position:fixed;
    width:400px;
    height:400px;
    background:radial-gradient(circle,rgba(255,0,0,.25),transparent 70%);
    pointer-events:none;
    transform:translate(-50%,-50%);
}

</style>
</head>

<body>

<div id="loader">Roblox Arşiv</div>
<div id="light"></div>

<section class="hero">
<h1>Roblox Arşiv</h1>
<p>GOD MODE Archive System</p>
</section>

<div class="grid">

<div class="card">
<h2>Archive Core</h2>
<p>Premium archive technology.</p>
</div>

<div class="card">
<h2>Security Layer</h2>
<p>Static GOD MODE frontend engine.</p>
</div>

<div class="card">
<h2>Future System</h2>
<p>Next generation archive UI.</p>
</div>

</div>

<script>

/* Mouse Light */

document.addEventListener("mousemove",e=>{
    let light=document.getElementById("light");
    light.style.left=e.clientX+"px";
    light.style.top=e.clientY+"px";
});

/* Particle Engine */

for(let i=0;i<120;i++){
    let p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"vw";
    p.style.top=Math.random()*100+"vh";
    p.style.opacity=Math.random();
    p.style.animationDuration=(10+Math.random()*40)+"s";
    document.body.appendChild(p);
}

</script>

</body>
</html>
