<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox-Arşiv</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px 0;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }
        nav a:hover {
            text-decoration: underline;
        }
        main {
            padding: 20px;
            max-width: 1000px;
            margin: auto;
        }
        .game-card {
            border: 1px solid #ccc;
            border-radius: 10px;
            padding: 10px;
            margin: 10px 0;
            background-color: white;
        }
        footer {
            text-align: center;
            padding: 10px;
            background-color: #2c3e50;
            color: white;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Roblox-Arşiv</h1>
        <nav>
            <a href="#">Ana Sayfa</a>
            <a href="#">Oyunlar</a>
            <a href="#">Hakkında</a>
            <a href="#">İletişim</a>
        </nav>
    </header>

    <main>
        <h2>Popüler Oyunlar</h2>
        <div class="game-card">
            <h3>Oyun 1</h3>
            <p>Kısa açıklama buraya gelecek.</p>
        </div>
        <div class="game-card">
            <h3>Oyun 2</h3>
            <p>Kısa açıklama buraya gelecek.</p>
        </div>
        <div class="game-card">
            <h3>Oyun 3</h3>
            <p>Kısa açıklama buraya gelecek.</p>
        </div>
    </main>

    <footer>
        &copy; 2026 Roblox-Arşiv | Tüm Hakları Saklıdır
    </footer>
</body>
</html>
