<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Roblox Arşiv AI</title>

<style>

body{
margin:0;
background:#050505;
color:white;
font-family:Arial;
}

/* Header */

header{
padding:20px;
border-bottom:1px solid red;
font-size:26px;
color:red;
}

/* Chat UI */

#chatBox{
position:fixed;
bottom:20px;
left:20px;
width:320px;
background:#0a0a0a;
border:1px solid red;
border-radius:15px;
padding:15px;
}

#messages{
height:180px;
overflow:auto;
font-size:14px;
}

#input{
width:100%;
margin-top:10px;
padding:8px;
background:black;
border:1px solid red;
color:white;
}

.user{
color:#ff5555;
}

.ai{
color:#aaa;
}

</style>
</head>

<body>

<header>Roblox Arşiv AI</header>

<div id="chatBox">

<div id="messages"></div>

<input id="input" placeholder="Bir şey yaz..." />

</div>

<script>

/* AI Cevap Havuzu */

const responses = {

"merhaba":[
"Merhaba! Sana nasıl yardımcı olabilirim?",
"Selam! Arşiv platformuna hoş geldin.",
"Hello!"
],

"roblox":[
"Roblox, online oyun platformudur.",
"Roblox arşiv sistemi içerik saklamak için tasarlandı.",
"Roblox oyunları hakkında bilgi verebilirim."
],

"site":[
"Bu site basit AI destekli arşiv platformudur.",
"Arşiv içeriklerini burada bulabilirsin."
],

"nasılsın":[
"Ben bir yazılım botuyum ama iyiyim!",
"Çalışıyorum 🙂",
"Her şey yolunda."
],

"oyun":[
"Oyun geliştirme web teknolojileri ile yapılabilir.",
"Mini GTA tarzı demo da yapabiliriz.",
"Tarayıcı oyunları HTML + JS ile mümkündür."
],

"default":[
"Bunu tam anlayamadım.",
"Daha açık yazabilir misin?",
"Başka bir şey sor."
]

};

const input=document.getElementById("input");
const messages=document.getElementById("messages");

function getAnswer(text){

text=text.toLowerCase();

for(let key in responses){
if(text.includes(key)){
let arr=responses[key];
return arr[Math.floor(Math.random()*arr.length)];
}
}

let def=responses["default"];
return def[Math.floor(Math.random()*def.length)];
}

/* Chat */

input.addEventListener("keypress",e=>{

if(e.key==="Enter"){

let userText=input.value;

messages.innerHTML+=`
<div class="user">Sen: ${userText}</div>
`;

let answer=getAnswer(userText);

messages.innerHTML+=`
<div class="ai">AI: ${answer}</div>
`;

input.value="";
messages.scrollTop=messages.scrollHeight;

}

});

</script>

</body>
</html>
