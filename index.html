<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Roblox Arşiv</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    background:black;
    color:white;
}

/* Neon başlık */
.title{
    text-align:center;
    font-size:80px;
    margin-top:40vh;
    animation: neonBlink 2s infinite;
    text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000;
}

@keyframes neonBlink{
    0%,100%{opacity:1;}
    50%{opacity:0.6;}
}

/* Scroll alanı */
.container{
    margin-top:60vh;
    padding:40px;
}

/* Foto grid */
.grid{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(150px,1fr));
    gap:15px;
}

.box{
    border:1px solid #ff0000;
    padding:10px;
    border-radius:10px;
    text-align:center;
    background:#0a0a0a;
}

input{
    width:100%;
    margin-top:10px;
}

</style>
</head>

<body>

<div class="title">Roblox Arşiv</div>

<div class="container">

<h2 style="text-align:center">Fotoğraf Yükleme Alanı</h2>

<div class="grid">

<script>
for(let i=1;i<=100;i++){
    document.write(`
    <div class="box">
        <div>${i}</div>
        <input type="file" accept="image/*">
    </div>
    `);
}
</script>

</div>
</div>

</body>
</html>
